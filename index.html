<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}

.app{width:min(430px,100vw);height:100dvh;margin:auto;position:relative;padding:22px 18px;background:var(--bg)}
.top{display:flex;justify-content:space-between;align-items:center;height:36px;color:var(--muted);font-size:12px;letter-spacing:.14em}
.pill{letter-spacing:0;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:#101010}.category-wrap{display:flex;justify-content:center;margin:12px auto 0}.category-select{max-width:310px;width:100%;background:#101010;color:#f4f4f4;border:1px solid var(--line);border-radius:999px;padding:10px 16px;font-size:12px;font-weight:750;outline:none}.category-note{text-align:center;color:#666;font-size:10px;margin-top:7px;min-height:13px}.difficulty{display:flex;gap:4px;margin:10px auto 0;padding:4px;width:max-content;border:1px solid var(--line);border-radius:999px;background:#101010}.difficulty button{flex:0 0 auto;border:0;border-radius:999px;background:transparent;color:var(--muted);padding:7px 12px;font-size:11px;letter-spacing:.04em}.difficulty button.active{background:#f2f2f2;color:#0a0a0a}.difficulty-note{text-align:center;color:#666;font-size:10px;margin-top:7px;min-height:13px}
.hint{text-align:center;color:var(--muted);font-size:13px;line-height:1.35;margin-top:18px}
.stage{position:relative;height:calc(100dvh - 96px)}
.defs{position:relative;height:230px;margin-top:32px}
.def{position:absolute;top:8px;width:150px;height:150px;border:2px solid var(--line);border-radius:50%;background:var(--circle);display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;font-size:13px;line-height:1.25;color:#ddd;transition:.24s ease}
.def:first-child{left:12px}.def:last-child{right:12px}
.def.eye{border-color:#777}.def.hot{border-color:#fff;transform:scale(1.045)}
.def.correct{border-color:var(--green);background:rgba(53,242,143,.12)}
.def.wrong{border-color:var(--red);background:rgba(255,90,101,.1);animation:shake .28s}

.feedback.show{opacity:1}

.bottom{position:absolute;left:18px;right:18px;bottom:18px;border-top:1px solid #202020;padding-top:12px;display:flex;gap:10px}
button{flex:1;border:1px solid var(--line);border-radius:15px;background:#111;color:#fff;padding:13px;font-weight:750;font-size:14px;cursor:pointer}
button.primary{background:#f2f2f2;color:#0a0a0a;border-color:#f2f2f2}
.smallstats{position:absolute;left:18px;right:18px;bottom:78px;display:none;grid-template-columns:repeat(3,1fr);gap:8px}
.smallstats.show{display:grid}
.stat{border:1px solid #242424;border-radius:14px;text-align:center;padding:8px;background:#0f0f0f}
.stat b{display:block;font-size:16px}.stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.ripple{position:absolute;width:16px;height:16px;border-radius:50%;border:2px solid var(--green);transform:translate(-50%,-50%);animation:ripple .7s forwards;pointer-events:none;z-index:3}

@keyframes ripple{to{opacity:0;transform:translate(-50%,-50%) scale(18)}}

</style>

<body>
<div class="app" id="app">
  <div class="top"><b>WORDSNAP</b><div class="pill">🔥 <span id="streak">1</span></div></div>
  <div class="category-wrap">
    <select class="category-select" id="categorySelect" onchange="setCategory(this.value)">
      <option value="All Career Skills">All Career Skills</option>
    </select>
  </div>
  <div class="category-note" id="categoryNote"></div>
  <div class="difficulty" id="difficulty">
    <button data-level="easy" onclick="setDifficulty('easy')">Easy</button>
    <button data-level="normal" onclick="setDifficulty('normal')">Normal</button>
    <button data-level="hard" onclick="setDifficulty('hard')">Hard</button>
  </div>
  <div class="difficulty-note" id="difficultyNote"></div>
  <div class="hint">Look at the word. Compare two meanings. Drag upward.</div>
  <main class="stage">
    <div class="defs" id="defs"></div>
    <div class="word breathe" id="wordCircle"><div class="sound" id="wordSound">🔊</div><span id="wordText"></span><div class="sub">drag me</div></div>
    <div class="feedback" id="feedback"></div>
    <div class="smallstats" id="statsBox"><div class="stat"><b id="xp">0</b><span>XP</span></div><div class="stat"><b id="mastered">0</b><span>Mastered</span></div><div class="stat"><b id="review">0</b><span>Review</span></div></div>
  </main>
  <div class="card" id="card">
    <h2 id="learnCorrect">Correct</h2>
    <h3 id="learnWord"></h3>
    <p id="learnIPA"></p>
    <p id="learnDef"></p>
    <p id="learnSentence"></p>
    <p id="memoryBridge"></p>
    <div class="cardLabel">Next word</div>
    <button class="cardNext" onclick="goToReview()">→</button>
  </div>
  <div class="bottom"><button class="primary" onclick="nextWord()">Next</button></div>
</div>

function setReadWords(el,text,wrapQuotes=false){
  const clean=String(text||"").replace(/^"|"$/g,"");
  const pieces=clean.split(/(\s+)/);

  el.innerHTML="";

  if(wrapQuotes){
    el.appendChild(document.createTextNode('"'));
  }

  pieces.forEach(piece=>{
    if(piece.trim()===""){
      el.appendChild(document.createTextNode(piece));
    }else{
      const span=document.createElement("span");
      span.className="readWord";
      span.textContent=piece;
      el.appendChild(span);
    }
  });

  if(wrapQuotes){
    el.appendChild(document.createTextNode('"'));
  }
}

function clearReadRed(){
  document.querySelectorAll(".readRed").forEach(el=>{
    el.classList.remove("readRed");
  });
}

function getBestVoice(){
  const voices=speechSynthesis.getVoices();

  return (
    voices.find(v=>v.lang==="en-US"&&/Google/i.test(v.name)) ||
    voices.find(v=>v.lang==="en-US"&&/Samantha|Alex|Microsoft/i.test(v.name)) ||
    voices.find(v=>v.lang==="en-US") ||
    voices.find(v=>v.lang&&v.lang.startsWith("en")) ||
    null
  );
}

function speakElementWords(el,text,onDone){
  if(!("speechSynthesis" in window)){
    if(onDone) onDone();
    return;
  }

  clearReadRed();
  speechSynthesis.cancel();

  const spans=[...el.querySelectorAll(".readWord")];
  const spokenText=String(text||"");
  const spokenWords=spokenText.match(/\b[\w'’-]+\b/g)||[];

  let ranges=[];
  let searchFrom=0;
  let fallbackIndex=0;

  spokenWords.forEach((word,index)=>{
    const position=spokenText.toLowerCase().indexOf(
      word.toLowerCase(),
      searchFrom
    );

    if(position>=0){
      ranges.push({
        start:position,
        end:position+word.length,
        span:spans[index]
      });
      searchFrom=position+word.length;
    }
  });

  const utterance=new SpeechSynthesisUtterance(spokenText);
  utterance.lang="en-US";
  utterance.rate=.78;
  utterance.pitch=1;

  const voice=getBestVoice();
  if(voice) utterance.voice=voice;

  utterance.onboundary=event=>{
    clearReadRed();

    const match=ranges.find(range=>
      event.charIndex>=range.start &&
      event.charIndex<range.end
    );

    const target=match?.span||spans[fallbackIndex++];

    if(target){
      target.classList.add("readRed");
    }
  };

  utterance.onend=()=>{
    clearReadRed();
    if(onDone) onDone();
  };

  utterance.onerror=()=>{
    clearReadRed();
    if(onDone) onDone();
  };

  speechSynthesis.speak(utterance);
}

function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function difficultyFor(word){
  const length=word.word.length;
  if(length<=7)return "easy";
  if(length<=11)return "normal";
  return "hard";
}

function wordsForDifficulty(){
  let filtered=words.filter(word=>difficultyFor(word)===state.difficulty);

  if(state.category!=="All Career Skills"){
    filtered=filtered.filter(word=>word.category===state.category);
  }

  if(filtered.length)return filtered;

  const categoryFallback=state.category==="All Career Skills"
    ? words
    : words.filter(word=>word.category===state.category);

  return categoryFallback.length?categoryFallback:words;
}

function rebuildCategoryOptions(){
  const categories=[...new Set(
    words
      .map(word=>String(word.category||"").trim())
      .filter(Boolean)
  )].sort((a,b)=>a.localeCompare(b));

  const selected=state.category||"All Career Skills";

  categorySelect.innerHTML="";
  categorySelect.add(new Option("All Career Skills","All Career Skills"));

  categories.forEach(category=>{
    categorySelect.add(new Option(category,category));
  });

  const values=[...categorySelect.options].map(option=>option.value);

  if(!values.includes(selected)){
    state.category="All Career Skills";
    save();
  }

  categorySelect.value=state.category;
}

function updateCategoryUI(){
  rebuildCategoryOptions();

  const available=words.filter(word=>
    state.category==="All Career Skills" ||
    word.category===state.category
  ).length;

  categoryNote.textContent=
    state.category==="All Career Skills"
      ? `${words.length} career terms across all skills`
      : `${available} terms in ${state.category}`;
}
function setCategory(category){
  state.category=category;
  state.i=0;
  save();
  updateCategoryUI();
  render();
}

function chooseWord(){
  const now=Date.now();
  const pool=wordsForDifficulty();
  const due=pool.filter(w=>(state.progress[w.id]?.due||0)<=now);
  const list=due.length?due:pool;
  return list[state.i%list.length];
}

function updateDifficultyUI(){
  document.querySelectorAll("#difficulty button").forEach(button=>{
    button.classList.toggle("active",button.dataset.level===state.difficulty);
  });

  const labels={
    easy:"Short intelligent words • 4–7 letters",
    normal:"Medium-length intelligent words • 8–11 letters",
    hard:"Long intelligent words • 12+ letters"
  };

  difficultyNote.textContent=labels[state.difficulty];
}

function setDifficulty(level){
  state.difficulty=level;
  state.i=0;
  save();
  updateDifficultyUI();
  render();
}
function render(){updateCategoryUI();updateDifficultyUI();current=chooseWord();locked=false;x=0;y=0;wc.style.transform="translate(0,0)";wc.style.borderColor="#fff";wc.classList.add("breathe");wordText.textContent=current.word;wc.classList.remove("long","xlong");if(current.word.length>12)wc.classList.add("xlong");else if(current.word.length>9)wc.classList.add("long");defs.innerHTML="";feedback.classList.remove("show");const choices=shuffle([{t:current.def,ok:1},{t:current.wrong,ok:0}]);choices.forEach(o=>{const el=document.createElement("div");el.className="def";el.dataset.ok=o.ok;el.innerHTML=`<div class="sound">🔊</div><span>${o.t}</span>`;el.querySelector(".sound").onclick=e=>{e.stopPropagation();speakText(o.t)};defs.appendChild(el)});xp.textContent=state.xp;streak.textContent=state.streak;mastered.textContent=state.mastered;review.textContent=wordsForDifficulty().filter(w=>(state.progress[w.id]?.due||0)<=Date.now()).length;setTimeout(()=>document.querySelectorAll(".def").forEach(d=>d.classList.add("eye")),350);setTimeout(()=>document.querySelectorAll(".def").forEach(d=>d.classList.remove("eye")),950)}
function center(el){const r=el.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
function nearest(){const w=center(wc);let best=null,dist=9999;document.querySelectorAll(".def").forEach(d=>{const c=center(d),v=Math.hypot(w.x-c.x,w.y-c.y);if(v<dist){dist=v;best=d}});return{best,dist}}
function clearHot(){document.querySelectorAll(".def").forEach(d=>d.classList.remove("hot"))}
function rippleAt(el){const c=center(el),r=app.getBoundingClientRect(),rp=document.createElement("div");rp.className="ripple";rp.style.left=(c.x-r.left)+"px";rp.style.top=(c.y-r.top)+"px";app.appendChild(rp);setTimeout(()=>rp.remove(),760)}
function haptic(type){if(navigator.vibrate)navigator.vibrate(type==="ok"?25:[18,35,18])}
function drop(){const n=nearest();const best=n.best,dist=n.dist;if(!best||dist>92){x=0;y=0;wc.style.transform="translate(0,0)";return}if(best.dataset.ok==="1"){locked=true;best.classList.add("correct");wc.style.borderColor="var(--green)";wc.classList.remove("breathe");const w=center(wc),b=center(best);x+=b.x-w.x;y+=b.y-w.y;wc.style.transform=`translate(${x}px,${y}px) scale(.68)`;rippleAt(best);haptic("ok");state.xp+=10;save();
setReadWords(learnCorrect,"Correct",false);
setReadWords(learnWord,current.word,false);
learnIPA.textContent=current.ipa;
setReadWords(learnDef,current.def,false);
setReadWords(learnSentence,current.sentence,true);
setReadWords(memoryBridge,current.bridge,false);

setTimeout(()=>{
  card.classList.add("show");
  readCorrectCard(current);
},520)}else{best.classList.add("wrong");haptic("bad");feedback.textContent="Try the other definition.";feedback.style.color="var(--red)";feedback.classList.add("show");const p=state.progress[current.id]||{seen:0,correct:0,missed:0,due:0};p.seen++;p.missed++;p.due=Date.now()+10*60*1000;state.progress[current.id]=p;save();setTimeout(()=>best.classList.remove("wrong"),400);setTimeout(()=>feedback.classList.remove("show"),850);x=0;y=0;wc.style.transform="translate(0,0)"}}
wordSound.onclick=e=>{e.stopPropagation();playWord(current)}
wordSound.onpointerdown=e=>e.stopPropagation();
wc.onpointerdown=e=>{if(locked)return;drag=true;wc.setPointerCapture(e.pointerId);sx=e.clientX-x;sy=e.clientY-y}
wc.onpointermove=e=>{if(!drag||locked)return;x=e.clientX-sx;y=e.clientY-sy;wc.style.transform=`translate(${x}px,${y}px) scale(1.03)`;clearHot();const n=nearest();if(n.best&&n.dist<105)n.best.classList.add("hot")}
wc.onpointerup=()=>{if(!drag||locked)return;drag=false;clearHot();drop()}

async function loadCareerWordLibrary(){
  const missingUrl =
    !WORD_LIBRARY_API_URL ||
    WORD_LIBRARY_API_URL.includes("PASTE_YOUR_APPS_SCRIPT");

  if(missingUrl){
    console.warn(
      "WordSnap is using its built-in preview words. " +
      "Paste your Apps Script /exec URL into WORD_LIBRARY_API_URL."
    );
    updateCategoryUI();
    updateDifficultyUI();
    render();
    return;
  }

  try{
    const separator =
      WORD_LIBRARY_API_URL.includes("?") ? "&" : "?";

    const response = await fetch(
      WORD_LIBRARY_API_URL +
      separator +
      "cache=" +
      Date.now(),
      {cache:"no-store"}
    );

    if(!response.ok){
      throw new Error(
        "The word-library request returned status " +
        response.status
      );
    }

    const payload = await response.json();

    if(!payload.ok || !Array.isArray(payload.words)){
      throw new Error(
        payload.error ||
        "The Apps Script response was not valid."
      );
    }

    const sheetWords = payload.words
      .map(item=>{
        const rawWord = String(item.word || "").trim();
        const id = String(item.id || rawWord)
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g,"-")
          .replace(/^-+|-+$/g,"");

        return {
          id,
          word: rawWord.toUpperCase(),
          ipa: String(item.ipa || "").trim(),
          level: String(item.level || "").trim().toLowerCase(),
          category: String(
            item.category || "All Career Skills"
          ).trim(),
          audio:
            String(item.audio_url || "").trim() ||
            `audio/${id}.mp3`,
          fallback: rawWord.toLowerCase(),
          def: String(item.definition || "").trim(),
          wrong: String(item.wrong_definition || "").trim(),
          sentence: String(item.example || "").trim(),
          bridge:
            "Memory bridge: " +
            String(item.memory_bridge || "").trim()
        };
      })
      .filter(item=>
        item.id &&
        item.word &&
        item.category &&
        item.def &&
        item.wrong
      );

    if(!sheetWords.length){
      throw new Error(
        "The Google Sheet did not return any active words."
      );
    }

    words = sheetWords;
    state.i = 0;

    const categories = new Set(
      words.map(word=>word.category)
    );

    if(
      state.category !== "All Career Skills" &&
      !categories.has(state.category)
    ){
      state.category = "All Career Skills";
    }

    save();

    console.info(
      `Loaded ${words.length} career words from Google Sheets.`
    );

  }catch(error){
    console.error("WordSnap library error:", error);
    words = [...FALLBACK_WORDS];
  }

  updateCategoryUI();
  updateDifficultyUI();
  render();
}

loadCareerWordLibrary();
</script>
